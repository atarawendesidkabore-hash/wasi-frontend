name: Deploy WASI Backend to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'wasi-intelligence/**'
      - 'archives-bf-ai/**'
      - 'wasi-dex/exports/**'
      - '.github/workflows/deploy-wasi-backend.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/wasi-backend
  CONTAINER_APP_NAME: wasi-backend-api
  RESOURCE_GROUP: wasi-rg
  CONTAINER_APP_ENV: wasi-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./wasi-intelligence/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}
          targetPort: 3200
          environmentVariables: |
            PORT=3200
            ANTHROPIC_MODEL=claude-sonnet-4-6
            ANTHROPIC_API_KEY=secretref:anthropic-api-key
            WASI_CORE_DB_PATH=/tmp/wasi-core.db
