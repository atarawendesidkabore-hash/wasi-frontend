<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WASI - West African Shipping Intelligence"
    />
    <title>WASI - West African Shipping Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script type="module">
      (async () => {
        if (window.location.protocol === "file:") {
          document.getElementById("root").innerHTML =
            '<div style="color:#f0b429;font-family:monospace;padding:40px;text-align:center">' +
            '<h1>WASI</h1>' +
            '<p style="color:#e2e8f0">Ce fichier ne peut pas être ouvert directement.</p>' +
            '<p style="color:#94a3b8">Lancez le serveur de développement :</p>' +
            '<pre style="color:#4ade80;background:#0f2a45;padding:16px;border-radius:8px;display:inline-block">' +
            'cd C:\\Users\\KaboreTarawendesida\\OneDrive\\Desktop\\WASI\nnpm run dev\n\nPuis ouvrez : http://localhost:3000</pre>' +
            '<p style="color:#94a3b8;margin-top:20px">Ou double-cliquez sur <b>start_frontend.bat</b></p></div>';
          return;
        }
        const LOCAL_API_CANDIDATES = [8010, 8001, 8000].map(
          (port) => `${window.location.protocol}//${window.location.hostname}:${port}`
        );
        const PROD_API_URL = "https://wasi-backend-api.onrender.com";
        const params = new URLSearchParams(window.location.search);
        const forcedApi = params.get("api");
        const storedApi =
          window.localStorage.getItem("WASI_PLATFORM_API_URL") ||
          window.localStorage.getItem("WASI_API_URL");
        const isLocalHost =
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1";

        async function isHealthy(url) {
          try {
            const health = await fetch(`${url}/api/health`, {
              method: "GET",
              cache: "no-store",
            });
            return health.ok;
          } catch (_) {
            return false;
          }
        }

        async function resolveApiUrl() {
          if (forcedApi) return forcedApi;
          if (storedApi) {
            if (await isHealthy(storedApi)) {
              return storedApi;
            }
            window.localStorage.removeItem("WASI_PLATFORM_API_URL");
            window.localStorage.removeItem("WASI_API_URL");
          }
          if (!isLocalHost) return PROD_API_URL;

          for (const candidate of LOCAL_API_CANDIDATES) {
            if (await isHealthy(candidate)) return candidate;
          }
          return PROD_API_URL;
        }

        const platformApiUrl = await resolveApiUrl();
        window.WASI_PLATFORM_API_URL = platformApiUrl;
        window.WASI_API_URL = platformApiUrl;
        window.WASI_BANKING_API_URL = platformApiUrl;
        window.WASI_DEX_API_URL = platformApiUrl;
        window.localStorage.setItem("WASI_PLATFORM_API_URL", platformApiUrl);
        window.localStorage.removeItem("WASI_API_URL");
        window.localStorage.removeItem("WASI_BANKING_API_URL");
        window.localStorage.removeItem("WASI_DEX_API_URL");
        await import("/src/main.jsx");
      })();
    </script>
    <style>
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        margin: 0;
        background: #030d1a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
