<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WASI - West African Shipping Intelligence"
    />
    <title>WASI - West African Shipping Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script type="module">
      (async () => {
        if (window.location.protocol === "file:") {
          document.getElementById("root").innerHTML =
            '<div style="color:#f0b429;font-family:monospace;padding:40px;text-align:center">' +
            '<h1>WASI</h1>' +
            '<p style="color:#e2e8f0">Ce fichier ne peut pas être ouvert directement.</p>' +
            '<p style="color:#94a3b8">Lancez le serveur de développement :</p>' +
            '<pre style="color:#4ade80;background:#0f2a45;padding:16px;border-radius:8px;display:inline-block">' +
            'cd C:\\Users\\KaboreTarawendesida\\OneDrive\\Desktop\\WASI\nnpm run dev\n\nPuis ouvrez : http://localhost:3000</pre>' +
            '<p style="color:#94a3b8;margin-top:20px">Ou double-cliquez sur <b>start_frontend.bat</b></p></div>';
          return;
        }
        const LOCAL_API_CANDIDATES = [
          `${window.location.protocol}//${window.location.hostname}:8001`,
          `${window.location.protocol}//${window.location.hostname}:8000`,
        ];
        const PROD_API_URL = "https://wasi-backend-api.onrender.com";
        const params = new URLSearchParams(window.location.search);
        const forcedApi = params.get("api");
        const storedApi = window.localStorage.getItem("WASI_API_URL");
        const selectedApp = (params.get("app") || "wasi").toLowerCase();
        const isBankingApp = ["banking", "bank", "wallet"].includes(selectedApp);
        const isLocalHost =
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1";

        function isLikelyBankingOnlyApi(url) {
          if (!url || typeof url !== "string") return false;
          return /:8010(?:\/|$)/.test(url) || /\/api\/v1\/banking(?:\/|$)/i.test(url);
        }

        async function isHealthy(url) {
          try {
            const health = await fetch(`${url}/api/health`, {
              method: "GET",
              cache: "no-store",
            });
            return health.ok;
          } catch (_) {
            return false;
          }
        }

        async function resolveApiUrl() {
          if (forcedApi) return forcedApi;
          if (storedApi) {
            if (!isBankingApp && isLikelyBankingOnlyApi(storedApi)) {
              window.localStorage.removeItem("WASI_API_URL");
            } else {
              if (await isHealthy(storedApi)) {
                return storedApi;
              }
              window.localStorage.removeItem("WASI_API_URL");
            }
          }
          if (!isLocalHost) return PROD_API_URL;

          for (const candidate of LOCAL_API_CANDIDATES) {
            if (await isHealthy(candidate)) return candidate;
          }
          return PROD_API_URL;
        }

        window.WASI_API_URL = await resolveApiUrl();
        await import("/src/main.jsx");
      })();
    </script>
    <style>
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        margin: 0;
        background: #030d1a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
