services:
  - type: web
    name: wasi-web-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    headers:
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8010"
      - key: BANKING_JWT_SECRET
        generateValue: true
      - key: BANKING_JWT_EXPIRES_IN
        value: 12h
      - key: CORS_ALLOWED_ORIGINS
        value: https://atarawendesidkabore-hash.github.io,http://localhost:3000,http://127.0.0.1:3000
      - key: BANKING_PASSWORD_PEPPER
        generateValue: true
      - key: WASI_ALLOW_DEMO_USERS
        value: "true"
      - key: WASI_DEMO_CLIENT_PASSWORD
        value: WasiClient2026!
      - key: WASI_DEMO_TELLER_PASSWORD
        value: WasiTeller2026!
      - key: WASI_DEMO_MANAGER_PASSWORD
        value: WasiManager2026!
    autoDeploy: true
