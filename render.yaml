services:
  - type: web
    name: wasi-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /
    headers:
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_WASI_BANKING_API_URL
        sync: false
    autoDeploy: true

  - type: web
    name: wasi-web-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    headers:
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8010"
      - key: BANKING_JWT_SECRET
        sync: false
      - key: BANKING_JWT_EXPIRES_IN
        value: 12h
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: BANKING_PASSWORD_PEPPER
        sync: false
    autoDeploy: true
