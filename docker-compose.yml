version: "3.9"

services:
  wasi-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: wasi-web:latest
    container_name: wasi-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_WASI_BANKING_API_URL=${VITE_WASI_BANKING_API_URL:-http://localhost:8010}
    depends_on:
      - wasi-web-api
    restart: unless-stopped

  wasi-web-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: wasi-web-api:latest
    container_name: wasi-web-api
    ports:
      - "8010:8010"
    environment:
      - NODE_ENV=production
      - PORT=8010
      - BANKING_JWT_SECRET=${BANKING_JWT_SECRET:?BANKING_JWT_SECRET is required - set it in .env}
      - BANKING_JWT_EXPIRES_IN=${BANKING_JWT_EXPIRES_IN:-12h}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - wasi_banking_data:/app/server/data
    restart: unless-stopped

volumes:
  wasi_banking_data:
